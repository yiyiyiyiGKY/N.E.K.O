[plugin]
name = "网络搜索"
description = "通过 DuckDuckGo 搜索网络内容。无需 API Key，免费使用。支持文本搜索和新闻搜索。"
version = "0.1.0"
id = "web_search"
entry = "plugins.web_search:WebSearchPlugin"

[plugin.author]
name = "N.E.K.O Team"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin_runtime]
enabled = true
auto_start = true

[plugin.store]
enabled = false

[search]
max_results = 8
region = "wt-wt"
timeout_seconds = 15
backend = "auto"
