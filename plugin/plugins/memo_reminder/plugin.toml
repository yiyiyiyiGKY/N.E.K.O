[plugin]
name = "备忘提醒"
description = "定时备忘录/闹钟插件，在指定时间提醒主人。支持一次性提醒和重复提醒。"
version = "0.1.0"
id = "memo_reminder"
entry = "plugins.memo_reminder:MemoReminderPlugin"

[plugin.author]
name = "N.E.K.O Team"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin_runtime]
enabled = true
auto_start = true

[plugin.store]
enabled = true

[memo]
max_reminders = 200
timezone = "Asia/Shanghai"
